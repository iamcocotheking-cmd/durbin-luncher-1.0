name: DURBIN Build Debug APK

on:
workflow_dispatch:
push:
branches:
- main

jobs:
build-debug:
runs-on: ubuntu-latest

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Set up JDK 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '21'

  - name: Set up Gradle 8.13
    uses: gradle/actions/setup-gradle@v4
    with:
      gradle-version: '8.13'

  - name: Regenerate language list if present
    run: |
      if [ -f "./scripts/languagelist_updater.sh" ]; then
        chmod +x ./scripts/languagelist_updater.sh
        ./scripts/languagelist_updater.sh
      else
        echo "No language list updater script found. Skipping."
      fi

  - name: Build debug APK
    run: |
      chmod +x ./gradlew
      ./gradlew :app_pojavlauncher:assembleDebug --stacktrace --console=plain

  - name: Upload debug APK
    uses: actions/upload-artifact@v4
    with:
      name: DURBIN-Debug-APK
      path: app_pojavlauncher/build/outputs/apk/debug/*.apk
